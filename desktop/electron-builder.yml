appId: com.vocsap.claude-peers-desk
productName: Claude Peers Deck
# Space-free binary name (convenient on PATH); productName stays the display
# name (window title, Start-menu shortcut, installer filename).
executableName: claude-peers-desk
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# node-pty ships a native .node binary that must stay outside the asar archive.
asarUnpack:
  - node_modules/node-pty/**
# Locale files are read at runtime from process.resourcesPath/locales when
# packaged (see ipc.ts buildI18n). Ship them as resources so `fr` resolves
# instead of silently falling back to the embedded English base (debt D3).
extraResources:
  - from: locales
    to: locales
win:
  # NSIS installer plus a portable .zip (run anywhere, no install).
  target:
    - nsis
    - zip
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
linux:
  # AppImage is already a single portable binary.
  target:
    - AppImage
  category: Development
